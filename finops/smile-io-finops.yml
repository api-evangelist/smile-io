description: >-
  FinOps view of Smile.io spend. Smile is a subscription SaaS loyalty app billed
  monthly by plan tier, where each plan bundles a monthly order allowance and
  charges per-order overage above that allowance. REST API access itself carries
  no separate metered fee - it is a capability unlocked on the Plus and
  Enterprise plans rather than usage billed per API call. The primary cost
  drivers are therefore the plan subscription and order-volume overage, plus any
  Enterprise contract terms.
notes: >-
  Per-unit overage and exact plan prices are a snapshot and change; verify on the
  Smile pricing page. API calls are not separately metered - the cost lever tied
  to the API is which plan tier you must be on (Plus or Enterprise) to use it at
  all.
sources:
- https://smile.io/pricing
