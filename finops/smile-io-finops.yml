publisherName: Smile.io
serviceCategory: Marketing and Loyalty
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Smile.io
  ServiceCategory: Marketing and Loyalty
  ProviderName: Smile.io
  PublisherName: Smile.io
  InvoiceIssuerName: Smile.io
  BillingCurrency: USD
