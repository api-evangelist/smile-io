meters:
- name: plan_subscription
  description: Fixed monthly subscription fee for the selected Smile plan tier.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: order_overage
  description: Per-order charge for monthly orders above the plan's included allowance.
  unit: orders
  aggregation: sum
  dimensions:
  - account
  - plan
- name: api_access
  description: REST API access as a plan capability (Plus and Enterprise); not metered per call.
  unit: capability
  aggregation: max
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track the plan subscription and monthly order volume against the included allowance so overage is anticipated, not a surprise.
- name: Allocation
  description: Attribute the loyalty subscription and overage to the storefront/brand that runs the Smile program.
- name: Optimization
  description: Right-size the plan tier to actual monthly order volume; only step up to Plus/Enterprise when REST API access, VIP tiers, or custom rate limits are genuinely required.
- name: Accountability
  description: Assign an owner to review monthly orders vs allowance and reassess plan fit before renewal.
maintainers:
