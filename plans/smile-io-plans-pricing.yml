specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Smile.io
providerId: smile-io
created: '2026-07-10'
modified: '2026-07-10'
reconciled: false
tags:
- Loyalty
- Rewards
- Referrals
- E-commerce
- Points
- Plans
description: >-
  Smile.io is sold as a subscription SaaS app (prominently on Shopify) priced by
  plan, with monthly order allowances and per-order overage above the allowance.
  Programmatic REST API access is plan-gated - it is unlocked on the Plus plan
  and Enterprise, and is not available on the Free, Essential, Standard, or
  Growth plans. The figures below are a snapshot of Smile's published pricing and
  change frequently; confirm current numbers on the pricing page during
  reconciliation.
notes: >-
  Prices, order allowances, and which tier unlocks the API can change. As
  observed, REST API access first appears on Plus (listed around $999/mo, often
  annual-billed) and Enterprise adds custom API rate limits and data-warehouse
  sync. Overage was observed around $5 per 100 orders above the monthly
  allowance on paid plans. Verify all values before relying on them.
sources:
- https://smile.io/pricing
- https://dev.smile.io/api/introduction
- https://dev.smile.io/api/rate-limits
plans:
- id: smile-free
  name: Free
  type: free
  description: >-
    Entry tier to run a points and referral program with Smile branding on the
    widgets. No REST API access.
  entries:
  - label: Included Monthly Orders
    name: free_orders
    type: usage
    metric: orders
    limit: 200
    timeFrame: month
    geo: global
    unit: 1
    price: '0'
    userMultiplied: false
  elements:
  - name: Points Program
  - name: Referral Program
  - name: No REST API Access
- id: smile-essential
