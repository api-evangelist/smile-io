aid: smile-io
url: https://raw.githubusercontent.com/api-evangelist/smile-io/refs/heads/main/apis.yml
name: Smile.io
kind: company
description: Smile.io is a loyalty, rewards, and referrals platform for e-commerce
  brands (widely used on Shopify). Merchants run points programs, referral programs,
  and VIP tiers, and integrate them programmatically through the Smile.io REST API
  (base https://api.smile.io/v1). The REST API exposes customers and customer
  identities, points transactions and settings, points products and purchases,
  earning rules, rewards and reward fulfillments, VIP tiers, and custom activities.
  It uses resource-oriented URLs, returns JSON, and is authenticated with an HTTP
  Bearer token (a merchant API key or an app OAuth access token). REST API access
  is gated to the Plus and Enterprise plans.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Loyalty
- Rewards
- Referrals
- E-commerce
- Points
- Customer Retention
- Shopify
created: '2026-07-10'
modified: '2026-07-10'
specificationVersion: '0.19'
apis:
- aid: smile-io:smile-io-customers-api
  name: Smile.io Customers API
  tags:
